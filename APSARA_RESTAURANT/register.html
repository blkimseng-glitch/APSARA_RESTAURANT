<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apsara Retaurant Register</title>
  <link rel="stylesheet" href="../src/output.css">
</head>
<body class="bg-orange-50 min-h-screen flex flex-col items-center py-10 px-4">

  <div class="max-w-4xl w-full bg-white rounded-3xl shadow-lg p-8 md:p-12">
    
    <div class="w-full h-64 md:h-80 rounded-3xl overflow-hidden mb-12 relative">
     <div id="slider" class="flex w-full h-full transition-transform duration-700 ease-in-out">
       <img src="../images/Apsara.jpg" class="w-full h-full object-cover flex-shrink-0" alt="Slide 1">
       <img src="../images/Apsara1.jpg" class="w-full h-full object-cover flex-shrink-0" alt="Slide 2">
       <img src="../images/Apsara2.jpg" class="w-full h-full object-cover flex-shrink-0" alt="Slide 3">
     </div>
      <div class="absolute inset-0 flex flex-col justify-center p-8 text-white pointer-events-none">
    <h2 class="text-4xl font-bold italic">Apsara Restaurant</h2>
  </div>
    </div>

 
    <div class="flex flex-col md:flex-row gap-12 items-start">
      <div class="flex-1 w-full">
        <h3 class="text-3xl font-bold text-gray-800 mb-2">Login</h3>
        <p class="text-gray-500 mb-6 text-sm">Enter your credentials to make your order</p>
        
        <form class="space-y-4">
          <input type="text" id="firstName" name="firstName" placeholder="Firstname" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-orange-500 bg-gray-50">
          <input type="text" id="firstName" name="firstName" placeholder="Lastname" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-orange-500 bg-gray-50">

          <input type="email" placeholder="Email" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-orange-500 bg-gray-50">
          <div class="relative">
            <input type="password" placeholder="Password" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-orange-500 bg-gray-50">
          </div>
          
          <div class="flex justify-between items-center text-sm mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="accent-orange-500"> Remember me
            </label>
            <a href="#" class="text-gray-600 underline">Reset my Password</a>
          </div>

          <div class="flex gap-4">
            <button class="bg-orange-500 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-orange-600 transition">LOGIN</button>
            <button class="border-2 border-orange-500 text-orange-500 font-bold py-3 px-8 rounded-xl hover:bg-orange-50 transition">SIGN IN</button>
          </div>
        </form>
      </div>

      <div class="hidden md:flex flex-col items-center self-stretch">
        <div class="w-px h-full bg-gray-300"></div>
        <span class="py-4 text-xs font-bold text-gray-400">OR</span>
        <div class="w-px h-full bg-gray-300"></div>
      </div>

      <div class="flex-1 w-full flex flex-col items-center">
        <div class="bg-white p-4 border border-gray-200 rounded-xl mb-6 shadow-sm">
           <img src="../images/bestqr.png" alt="QR Code" class="w-60 h-60">
        </div>

        <div class="w-full relative">
          <input type="text" placeholder="Paste your code here" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-orange-500 pr-10">
          <button class="absolute right-3 top-3 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
            </svg>
          </button>
        </div>
        <button class="mt-6 w-full bg-orange-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-orange-600">CONTINUE</button>
      </div>

    </div>
  </div>

</body>
<script>
  const slider = document.getElementById('slider');
  const slides = slider.children;
  let currentIndex = 0;

  function nextSlide() {
    currentIndex++;
    
    // If we reach the end, reset to the first slide
    if (currentIndex >= slides.length) {
      currentIndex = 0;
    }
    
    // Move the slider left/right
    // -100% * index shifts the view to the next image
    slider.style.transform = `translateX(-${currentIndex * 100}%)`;
  }

  // Change image every 4 seconds
  setInterval(nextSlide, 4000);
</script>
</html>
